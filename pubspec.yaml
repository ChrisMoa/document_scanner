# pubspec.yaml
name: document_scanner
description: A mobile document scanner app with PDF creation and cloud storage

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Document Scanning
  cunning_document_scanner: ^1.2.3
  image_picker: ^1.0.4

  # Image Processing
  # opencv_dart: ^1.0.4
  # dartcv4: ^1.1.4
  image: ^4.1.3
  camera: ^0.11.1

  # PDF Generation
  pdf: ^3.10.6
  printing: ^5.11.1

  # File Management
  path_provider: ^2.1.2
  file_picker: ^10.1.9
  permission_handler: ^11.4.0

  # Storage & Persistence
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Cloud Storage (Nextcloud)
  http: ^1.1.2
  dio: ^5.4.0
  xml: ^6.5.0

  # Encryption
  crypto: ^3.0.3
  encrypt: ^5.0.3

  # UI Components
  cupertino_icons: ^1.0.2
  flutter_slidable: ^4.0.0
  go_router: ^13.2.0

  # Utils
  path: ^1.8.3
  uuid: ^4.2.1
  device_info_plus: ^10.1.0
  flutter_launcher_icons: ^0.14.3

flutter_icons:
  android: true
  ios: true
  linux: true
  windows:
    generate: true
    image_path: "assets/images/app_image.png"
    icon_size: 256 # min:48, max:256, default: 48
  image_path: "assets/images/app_image.png"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.7
  hive_generator: ^2.0.1
  json_annotation: ^4.8.1
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  # assets:
  #   - assets/images/
  #   - assets/icons/
